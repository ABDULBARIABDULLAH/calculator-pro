
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABDUL BARI Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
}

/* Calculator */

.calculator{
    width:430px;
    background:#ffffff;
    padding:20px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* Top Bar */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#333;
}

.github-btn{
    background:#24292e;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
}

/* Display */

#display{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    border-radius:20px;
    background:#f8f8f8;
    color:#111;
    font-size:38px;
    font-weight:bold;
    text-align:right;
    padding:20px;
    margin-bottom:20px;
    box-shadow:inset 0 2px 8px rgba(0,0,0,0.08);
}

/* Buttons */

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    border:none;
    border-radius:18px;
    cursor:pointer;
    height:65px;
    font-size:22px;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* Skin Color Buttons */

.num{
    background:#f4c7ab;
    color:#333;
}

.operator{
    background:#f0b48f;
    color:#333;
}

.clear{
    background:#ff7b7b;
    color:white;
}

/* Big Equal Button */

.equal{
    background:#4caf50;
    color:white;
    grid-row:span 2;
    height:142px;
    font-size:30px;
}

.equal:hover{
    background:#43a047;
}

</style>
</head>

<body>

<div class="calculator">

<div class="top-bar">
    <div class="logo">ABDUL BARI</div>

    <a href="https://github.com/ABDULBARIABDULLAH/calculator-pro"
       target="_blank"
       class="github-btn">
       GitHub
    </a>
</div>

<input type="text" id="display" value="0" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="backspace()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="operator" onclick="append('+')">+</button>

</div>

</div>

<script>

const display = document.getElementById("display");

function append(value){

    if(display.value === "0"){
        display.value = value;
    }else{
        display.value += value;
    }

}

function clearDisplay(){
    display.value = "0";
}

function backspace(){

    if(display.value.length > 1){
        display.value = display.value.slice(0,-1);
    }else{
        display.value = "0";
    }

}

function calculate(){

    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }

}

document.addEventListener("keydown",function(e){

    if("0123456789+-*/.".includes(e.key)){
        append(e.key);
    }

    if(e.key === "Enter"){
        calculate();
    }

    if(e.key === "Backspace"){
        backspace();
    }

});

</script>

</body>
</html>
